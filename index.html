<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>SQG — Serviço · Qualidade · Gestão</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="components.css"/>
  <link rel="stylesheet" href="mobile.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-comment-anchor="root">
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="home-1.jsx"></script>
  <script type="text/babel" src="home-2.jsx"></script>
  <script type="text/babel" src="contact.jsx"></script>

  <script type="text/babel">
    const NAV_LINKS = [
      { label: "Serviços",   href: "#servicos" },
      { label: "Filosofia",  href: "#filosofia" },
      { label: "Simulador",  href: "#simulador" },
      { label: "Portal",     href: "portal/login.html" },
      { label: "Equipa",     href: "#equipa" },
      { label: "Insights",   href: "#insights" },
      { label: "Contacto",   href: "#contacto" },
    ];

    function App() {
      const [heroVariant, setHeroVariant] = React.useState('A');

      // Scroll reveal — armed only if user hasn't scrolled yet at first paint.
      React.useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        if (window.scrollY > 0 || !('IntersectionObserver' in window)) {
          els.forEach(el => el.classList.add('in'));
          return;
        }
        document.documentElement.classList.add('js-reveal-armed');
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.05, rootMargin: '0px 0px -8% 0px' });
        els.forEach(el => obs.observe(el));
        // Failsafe: reveal everything after 4s no matter what
        const t = setTimeout(() => els.forEach(el => el.classList.add('in')), 4000);
        return () => { obs.disconnect(); clearTimeout(t); };
      }, []);

      return (
        <React.Fragment>
          <SQGTweaks onHeroVariantChange={setHeroVariant}/>
          <Nav links={NAV_LINKS}/>
          <Hero heroVariant={heroVariant}/>
          <Marquee/>
          <div className="reveal"><Services/></div>
          <div className="reveal" id="filosofia"><Philosophy/></div>
          <div className="reveal"><Simulator/></div>
          <div className="reveal"><DashboardDemo/></div>
          <div className="reveal"><Testimonial/></div>
          <div className="reveal"><Team/></div>
          <div className="reveal"><Contact/></div>
          <Footer/>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
